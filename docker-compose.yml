services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: catshelter
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/catshelter
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      UPLOAD_DIR: /uploads/gatos/
    volumes:
      - uploads:/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  uploads:
