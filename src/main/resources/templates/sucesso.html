<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitação enviada — Cat Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --coral:#FB8A60; --coral-dark:#ef7146; --cream:#F4F3EF; --ink:#3a3a3a; --muted:#9a9a96; }
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Nunito',sans-serif; background:var(--cream); color:var(--ink); -webkit-font-smoothing:antialiased; min-height:100vh; display:flex; flex-direction:column; }
        h1,h2,h3 { font-family:'Fredoka',sans-serif; }
        .wrap { max-width:1140px; margin:0 auto; padding:0 24px; }
        a { text-decoration:none; }

        header { position:sticky; top:0; z-index:50; background:rgba(244,243,239,.88); backdrop-filter:blur(12px); border-bottom:1px solid rgba(125,160,184,.18); }
        .nav { display:flex; align-items:center; justify-content:space-between; height:78px; }
        .brand img { height:46px; }
        .nav-links { display:flex; gap:30px; }
        .nav-links a { color:var(--ink); font-weight:700; font-size:.98rem; }
        .nav-links a:hover { color:var(--coral-dark); }
        .btn { font-family:'Nunito',sans-serif; border:none; cursor:pointer; font-weight:800; padding:13px 26px; border-radius:999px; font-size:.95rem; transition:transform .15s,background .2s; display:inline-flex; align-items:center; justify-content:center; }
        .btn-coral { background:var(--coral); color:#fff; box-shadow:0 8px 20px rgba(251,138,96,.35); }
        .btn-coral:hover { background:var(--coral-dark); transform:translateY(-2px); }

        main { flex:1; display:flex; align-items:center; justify-content:center; padding:3rem 24px; }
        .success-box { background:#fff; border-radius:24px; border:4px solid #fcd9c8; box-shadow:0 14px 40px rgba(58,58,58,.08); padding:3rem; max-width:460px; width:100%; text-align:center; }
        .success-icon { width:72px; height:72px; background:#D4F5E2; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 1.5rem; }
        .success-icon svg { width:34px; height:34px; stroke:#1A7A46; }
        .success-box h2 { font-size:1.8rem; font-weight:700; margin-bottom:.75rem; }
        .success-box p { font-size:.92rem; color:#6b6b67; line-height:1.7; margin-bottom:2rem; }

        footer { padding:40px 0 28px; border-top:1px solid rgba(125,160,184,.18); }
        .foot { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:20px; }
        .foot img { height:40px; }
        .foot p { color:var(--muted); font-size:.9rem; margin-top:6px; }
        .foot-links { display:flex; gap:22px; }
        .foot-links a { color:var(--ink); font-weight:700; font-size:.9rem; }
    </style>
</head>
<body>

<header>
    <div class="wrap nav">
        <a class="brand" th:href="@{/}"><img th:src="@{/images/logo.jpeg}" alt="Cat Center"></a>
        <nav class="nav-links">
            <a th:href="@{/adotar}">Adotar</a>
            <a th:href="@{/#como}">Como funciona</a>
            <a th:href="@{/#contato}">Contato</a>
        </nav>
        <a th:href="@{/adotar}" class="btn btn-coral">Ver gatinhos</a>
    </div>
</header>

<main>
    <div class="success-box">
        <div class="success-icon">
            <svg fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                <polyline points="20 6 9 17 4 12"/>
            </svg>
        </div>
        <h2>Solicitação enviada!</h2>
        <p>Recebemos seu pedido de adoção. Nossa equipe vai analisar e entrar em contato pelo telefone informado em até <strong>2 dias úteis</strong>.</p>
        <a th:href="@{/}" class="btn btn-coral" style="width:100%">Voltar ao início</a>
    </div>
</main>

<footer id="contato">
    <div class="wrap foot">
        <div><img th:src="@{/images/logo.jpeg}" alt="Cat Center"><p>© 2026 Cat Center · Abrigo de gatos · São Paulo, SP</p></div>
        <div class="foot-links"><a href="#">Instagram</a><a href="#">WhatsApp</a><a href="mailto:contato@catcenter.com.br">E-mail</a></div>
    </div>
</footer>
</body>
</html>
