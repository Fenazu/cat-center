<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adoções — Cat Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<nav class="navbar">
    <a th:href="@{/}" class="navbar-brand">
        <img th:src="@{/images/logo.jpeg}" alt="Cat Center">
    </a>
    <div class="navbar-links">
        <a th:href="@{/adotar}">Adotar</a>
        <a th:href="@{/#como}">Como funciona</a>
        <a th:href="@{/#contato}">Contato</a>
        <a th:href="@{/gatos}">Gatos</a>
        <a th:href="@{/adotantes}">Adotantes</a>
        <a th:href="@{/adocoes}" class="active">Adoções</a>
        <a th:href="@{/adocao/nova}" class="navbar-cta">+ Nova adoção</a>
    </div>
</nav>

<div class="page-top">
    <div>
        <div class="breadcrumb">Painel &rsaquo; Adoções</div>
        <h1>Adoções</h1>
    </div>
</div>

<div class="container">

    <div th:if="${#lists.isEmpty(adocoes)}" class="empty">
        <div class="empty__title">Nenhuma adoção registrada</div>
        <div class="empty__sub">Registre a primeira adoção do Cat Center</div>
        <a th:href="@{/adocao/nova}" class="btn btn-primary" style="margin-top:1.25rem">Nova adoção</a>
    </div>

    <div th:if="${not #lists.isEmpty(adocoes)}" class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Gato</th>
                    <th>Adotante</th>
                    <th>Data</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="adocao : ${adocoes}">
                    <td style="font-weight:800"><a th:href="@{/adocao/{id}(id=${adocao.id})}" th:text="${adocao.nomeGato}" style="color:inherit;text-decoration:none;border-bottom:1px dotted var(--coral)"></a></td>
                    <td th:text="${adocao.nomeAdotante}"></td>
                    <td th:text="${adocao.data}"></td>
                    <td>
                        <span th:text="${adocao.status}"
                              th:classappend="${adocao.status.name() == 'APROVADA'} ? 'badge badge-green' :
                                             (${adocao.status.name() == 'CANCELADA'} ? 'badge badge-red' : 'badge badge-yellow')">
                        </span>
                    </td>
                    <td>
                        <div style="display:flex;gap:.5rem">
                            <a th:href="@{/adocao/{id}/status(id=${adocao.id})}" class="btn btn-outline btn-sm">Alterar status</a>
                            <form th:action="@{/adocao/{id}/deletar(id=${adocao.id})}" method="post"
                                  onsubmit="return confirm('Remover esta adoção?')" style="display:inline">
                                <button type="submit" class="btn btn-ghost btn-sm">Remover</button>
                            </form>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

<footer class="site-footer">
    <div class="foot-inner">
        <div>
            <img th:src="@{/images/logo.jpeg}" alt="Cat Center">
            <p>© 2026 Cat Center · Abrigo de gatos · São Paulo, SP</p>
        </div>
        <div class="foot-links">
            <a href="#">Instagram</a>
            <a href="#">WhatsApp</a>
            <a href="mailto:contato@catcenter.com.br">E-mail</a>
        </div>
    </div>
</footer>
</body>
</html>
