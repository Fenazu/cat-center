<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gatos — Cat Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
    <style>
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: .9rem; }
        thead th { text-align: left; font-size: .72rem; font-weight: 800; text-transform: uppercase;
                   letter-spacing: .06em; color: var(--text-muted); padding: .6rem 1rem;
                   border-bottom: 2px solid var(--border); }
        tbody tr { border-bottom: 1px solid var(--border); transition: background .15s; }
        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: #faf9f7; }
        tbody td { padding: .75rem 1rem; vertical-align: middle; }
        .td-name { font-weight: 800; color: var(--text); }
        .td-actions { display: flex; gap: .5rem; justify-content: flex-end; }
    </style>
</head>
<body>

<nav class="navbar">
    <a th:href="@{/}" class="navbar-brand">
        <img th:src="@{/images/logo.jpeg}" alt="Cat Center">
    </a>
    <div class="navbar-links">
        <a th:href="@{/gatos}" class="active">Gatos</a>
        <a th:href="@{/adotantes}">Adotantes</a>
        <a th:href="@{/adocoes}">Adoções</a>
        <a th:href="@{/gato/novo}" class="navbar-cta">+ Cadastrar</a>
    </div>
</nav>

<div class="page-top">
    <div>
        <div class="breadcrumb">Painel &rsaquo; Gatos</div>
        <h1>Gatos</h1>
    </div>
</div>

<div class="container">

    <div th:if="${#lists.isEmpty(gatos)}" class="empty">
        <div class="empty__title">Nenhum gato cadastrado</div>
        <div class="empty__sub">Cadastre o primeiro gato do Cat Center</div>
        <a th:href="@{/gato/novo}" class="btn btn-primary" style="margin-top:1.25rem">Cadastrar gato</a>
    </div>

    <div th:if="${not #lists.isEmpty(gatos)}" class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Sexo</th>
                    <th>Faixa etária</th>
                    <th>Cor</th>
                    <th>Castrado</th>
                    <th>Status</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="gato : ${gatos}">
                    <td class="td-name" th:text="${gato.nome}"></td>
                    <td th:text="${gato.sexo.name() == 'FEMEA' ? 'Fêmea' : 'Macho'}"></td>
                    <td th:text="${#strings.capitalize(#strings.toLowerCase(gato.faixaEtaria.name()))}"></td>
                    <td th:text="${#strings.capitalize(#strings.toLowerCase(gato.cor))}"></td>
                    <td th:text="${gato.castrado.name() == 'SIM' ? 'Sim' : 'Não'}"></td>
                    <td>
                        <span th:if="${gato.disponivel.name() == 'SIM'}" class="badge badge-green">Disponível</span>
                        <span th:if="${gato.disponivel.name() == 'NAO'}" class="badge badge-red">Indisponível</span>
                    </td>
                    <td class="td-actions">
                        <a th:href="@{/gato/{id}/editar(id=${gato.id})}" class="btn btn-primary btn-sm">Editar</a>
                        <a th:href="@{/gato/{id}/deletar(id=${gato.id})}"
                           class="btn btn-ghost btn-sm"
                           onclick="return confirm('Tem certeza que deseja remover este gato?')">Remover</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<footer>Cat Center &mdash; Sistema de Gestão de Adoções</footer>
</body>
</html>
